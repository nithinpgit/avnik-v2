# Production: from repo root run `docker compose -f compose.prod.yaml up --build`
# Frontend nginx serves the SPA and proxies /api, /socket.io, and /ws (SFU signaling) to backend / mediaserver.
# Publish UDP RTP range on meet-mediaserver (or use hostNetwork in Kubernetes). Set MEDIASOUP_ANNOUNCED_IP to a
# browser-reachable address (node public IP, LB, or pod host).
# Terminate TLS at your edge reverse proxy (e.g. Traefik, Caddy, cloud LB) in front of the published HTTP port.
name: avnik-meeting-prod

x-media-jwt-secret: &media_jwt_secret
  MEDIA_JWT_SECRET: ${MEDIA_JWT_SECRET:-change-me-set-MEDIA_JWT_SECRET-in-production}

services:
  postgres:
    image: postgres:16-alpine
    container_name: meet-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meet}
      POSTGRES_DB: ${POSTGRES_DB:-meet}
    volumes:
      - meet_postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meet} -d ${POSTGRES_DB:-meet}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: meet-redis-prod
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - meet_redis_data_prod:/data

  meet-backend:
    build:
      context: ./meet-backend
      dockerfile: Dockerfile
    container_name: meet-backend-prod
    environment:
      <<: *media_jwt_secret
      NODE_ENV: production
      PORT: "3000"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://${POSTGRES_USER:-meet}:${POSTGRES_PASSWORD:-meet}@postgres:5432/${POSTGRES_DB:-meet}
      DATABASE_SYNC: ${DATABASE_SYNC:-false}
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  meet-mediaserver:
    build:
      context: ./meet-mediaserver
      dockerfile: Dockerfile
    container_name: meet-mediaserver-prod
    environment:
      <<: *media_jwt_secret
      NODE_ENV: production
      PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:-}
      MEDIASOUP_RTC_MIN_PORT: ${MEDIASOUP_RTC_MIN_PORT:-40000}
      MEDIASOUP_RTC_MAX_PORT: ${MEDIASOUP_RTC_MAX_PORT:-40100}
    expose:
      - "3001"
    ports:
      - "${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}:${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}/udp"
    depends_on:
      - redis

  meet-frontend:
    build:
      context: ./meet-frontend
      dockerfile: Dockerfile
    container_name: meet-frontend-prod
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - meet-backend
      - meet-mediaserver

volumes:
  meet_redis_data_prod:
  meet_postgres_data_prod:
